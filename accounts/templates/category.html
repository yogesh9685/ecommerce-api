{% extends "base.html" %}

{% block content %}

<h1 class="text-2xl font-bold mb-6" id="category-title"></h1>

<div id="products"
class="grid grid-cols-4 gap-6">

</div>


<script>

let token = localStorage.getItem("access")

if(!token){

window.location.href="/accounts/login/"

}


// URL se category id lena

let path = window.location.pathname

let categoryId = path.split("/")[2]


// Products load karna

function loadCategoryProducts(){

fetch(`/accounts/products/?category=${categoryId}`,{

headers:{
"Authorization":"Bearer "+token
}

})

.then(res=>res.json())

.then(data=>{

let container = document.getElementById("products")

container.innerHTML=""

data.forEach(product=>{

container.innerHTML += `

<div class="bg-white p-4 shadow rounded">

<img src="https://via.placeholder.com/200" class="w-full">

<h2 class="text-lg font-bold mt-2">${product.name}</h2>

<p class="text-gray-600">₹${product.price}</p>

<button class="bg-blue-500 text-white px-3 py-1 mt-2 rounded">
Add to Cart
</button>

</div>

`

})

})

}

loadCategoryProducts()

</script>

{% endblock %}
