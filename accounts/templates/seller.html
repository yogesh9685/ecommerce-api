{% extends "base.html" %}

{% block content %}
<h2 class="text-2xl font-bold mb-6">Categories</h2>

<div id="categories"
class="grid grid-cols-4 gap-6 mb-10">
</div>


<h2 class="text-2xl font-bold mb-6">Products</h2>

<div id="products"
class="grid grid-cols-4 gap-6">
</div>

<script>

let token = localStorage.getItem("access")

if(!token){
    window.location.href="/accounts/login/"
}








function loadCategories(){

fetch("/accounts/categories/",{

headers:{
"Authorization":"Bearer "+token
}

})
.then(res=>res.json())
.then(data=>{

let container = document.getElementById("categories")

container.innerHTML=""

data.forEach(cat=>{

container.innerHTML += `

<div onclick="loadProducts(${cat.id})"
class="bg-white shadow rounded p-4 cursor-pointer hover:shadow-lg">

<img src="${cat.image}"
class="w-full h-40 object-cover rounded">

<h3 class="text-center mt-3 font-bold">
${cat.name}
</h3>

</div>

`

})

})

}





function loadProducts(categoryId=null){

let url="/accounts/products/"

if(categoryId){
url += "?category="+categoryId
}

fetch(url,{

headers:{
"Authorization":"Bearer "+token
}

})
.then(res=>res.json())
.then(data=>{

let container = document.getElementById("products")

container.innerHTML=""

data.forEach(product=>{

container.innerHTML += `

<div class="bg-white shadow rounded p-4">


<img src="${product.image}"
class="w-full h-40 object-cover rounded">

<h2 class="text-lg font-bold mt-2">
${product.name}
</h2>

<p class="text-gray-600">
₹${product.price}
</p>

<button class="bg-blue-500 text-white px-3 py-1 mt-2 rounded">
Add to Cart
</button>

</div>

`

})

})

}

loadCategories()
loadProducts()

</script>

{%endblock%}
