<html>
<head>

<title>Register</title>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-gray-100">

{% csrf_token %}

<div class="max-w-md mx-auto mt-20 bg-white p-6 shadow rounded">

<h2 class="text-xl font-bold mb-4 text-center">Register</h2>

<input id="username" placeholder="Username" class="border p-2 w-full mb-2 rounded">

<input id="first_name" placeholder="First Name" class="border p-2 w-full mb-2 rounded">

<input id="last_name" placeholder="Last Name" class="border p-2 w-full mb-2 rounded">

<input id="email" placeholder="Email" class="border p-2 w-full mb-2 rounded">

<input id="password" type="password" placeholder="Password" class="border p-2 w-full mb-4 rounded">


<label class="block text-gray-700 mb-2 font-semibold">
Select Account Type
</label>

<div class="flex gap-6 mb-4">

<label class="flex items-center gap-2">

<input type="radio" name="role" value="customer">

<span>Customer</span>

</label>


<label class="flex items-center gap-2">

<input type="radio" name="role" value="seller">

<span>Seller</span>

</label>

</div>


<button onclick="register()"
class="bg-blue-500 text-white p-2 w-full rounded">

Register

</button>

</div>



<script>

function getCSRFToken(){

return document.querySelector('[name=csrfmiddlewaretoken]').value;

}



function register(){

let username=document.getElementById("username").value
let first_name=document.getElementById("first_name").value
let last_name=document.getElementById("last_name").value
let email=document.getElementById("email").value
let password=document.getElementById("password").value


if(username=="" || first_name=="" || last_name=="" || email=="" || password==""){

alert("All fields required")
return

}


let radios = document.getElementsByName("role")

let role = null

for(let i=0;i<radios.length;i++){

if(radios[i].checked){

role = radios[i].value

}

}


if(role == null){

alert("Please select Customer or Seller")

return

}


console.log("Selected Role:",role)


fetch("/accounts/register/",{

method:"POST",

headers:{
"Content-Type":"application/json",
"X-CSRFToken":getCSRFToken()
},

body:JSON.stringify({

username:username,
first_name:first_name,
last_name:last_name,
email:email,
password:password,
role:role

})

})

.then(res=>res.json())

.then(data=>{

console.log(data)

if(data.message){

alert("OTP sent")

window.location.href="/accounts/otp/"

}else{

alert(JSON.stringify(data))

}

})

}

</script>

</body>
</html>
